# Morning Brief RSS Sources
# RSS 信息源配置

## 获取策略
# - AI 分类取 TOP 10
# - GovTech 分类取 TOP 3
# - BigTech 分类取 TOP 5
# - 互联网资讯取 TOP 5（前端科技/电子硬件/手机应用）
# - 奇思妙想取 TOP 3
# - 技术团队与安全取 TOP 4
# - 产品与架构取 TOP 2
# - 优先级: P0 必看 > P1 推荐 > P2 可选
# - 时间窗口: 仅过去 24 小时

ai:
  # P0 - 必看（核心关注）
  - name: OpenAI
    url: https://openai.com/blog/rss
    description: OpenAI 官方博客
    priority: P0
    enabled: true

  - name: Anthropic
    url: https://www.anthropic.com/rss
    description: Anthropic 官方博客
    priority: P0
    enabled: true

  - name: TLDR AI
    url: https://bullrich.dev/tldr-rss/ai.rss
    description: TLDR AI 摘要
    priority: P0
    enabled: true

  # P1 - 推荐（高质量）
  - name: The Rundown AI
    url: https://rss.beehiiv.com/feeds/2R3C6Bt5wj.xml
    description: The Rundown AI 通讯
    priority: P1
    enabled: true

  - name: Google AI
    url: https://ai.googleblog.com/feeds/posts/default
    description: Google AI 研究博客
    priority: P1
    enabled: true

  - name: Microsoft AI
    url: https://blogs.microsoft.com/ai/feed/
    description: Microsoft AI 博客
    priority: P1
    enabled: true

  # P2 - 可选（扩展）
  - name: Meta AI
    url: https://about.meta.com/rss/meta-ai/
    description: Meta AI 官方博客
    priority: P2
    enabled: true

  - name: Apple AI
    url: https://machinelearning.apple.com/rss
    description: Apple 机器学习博客
    priority: P2
    enabled: true

  - name: AI Weekly
    url: https://aiweekly.co/rss.xml
    description: AI 周刊
    priority: P2
    enabled: true

  - name: Import AI
    url: https://jack-clark.net/rss/
    description: Import AI 新闻
    priority: P2
    enabled: false  # 默认关闭，按需开启

  - name: Algorithm
    url: https://www.technologyreview.com/feed/
    description: MIT Technology Review
    priority: P2
    enabled: false  # 默认关闭，按需开启

