# PAIOS Knowledge Schema
type: object
required:
  - type
  - status
  - created
  - updated
properties:
  type:
    type: string
    const: knowledge
  status:
    type: string
    enum: [active, archived]
    default: active
  created:
    type: string
    format: date
  updated:
    type: string
    format: date
  tags:
    type: array
    items:
      type: string
